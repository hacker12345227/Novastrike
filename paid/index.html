<!DOCTYPE html>
<html lang="en">
<head>
<title>TitanPulse | Payment Complete</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="../style.css">

<style>
.success-box{
    max-width:700px;
    margin:120px auto;
    padding:50px;
    text-align:center;
    background:rgba(16,16,16,0.9);
    border:1px solid #ff2b2b;
    border-radius:12px;
    box-shadow:0 0 40px #000;
}

.success-box img{
    width:90px;
    margin-bottom:20px;
}

.message{
    font-size:22px;
    margin-top:20px;
    color:#fff;
    font-weight:bold;
}
</style>
</head>

<body>

<header>
  <div class="logo">
    <img src="../assets/logo.png" alt="TitanPulse Logo">
    <h2>TITANPULSE</h2>
  </div>
</header>

<nav>
  <a href="/">Home</a>
  <a href="/plans/">Plans</a>
  <a href="/about/">About</a>
  <a href="/support/">Support</a>
</nav>

<div class="success-box">

<img src="../assets/vink.png" alt="Betaald">

<h1 id="title">Payment</h1>

<div class="message" id="message">Loading...</div>

<br>

<a class="cta-btn" href="/">Back to Home</a>

</div>

<footer>
  <p>© 2026 TITANPULSE</p>
  <p class="footer-credit" style="font-size:12px; margin-top:5px; opacity:0.7; text-align:center;">
    Website gemaakt door: <a href="https://www.titanpulse.nl/" target="_blank" rel="noopener">TitanPulse</a>
  </p>
</footer>

<script>
const params = new URLSearchParams(window.location.search);

const language = params.get("language");
const reden = params.get("reden") || "Unknown";

const title = document.getElementById("title");
const message = document.getElementById("message");

if(language === "nl"){

    title.textContent = "Betaald";
    message.textContent = "Uw betaling voor " + reden + " is succesvol verwerkt!";

}else{

    title.textContent = "Paid";
    message.textContent = "Your payment for " + reden + " has been processed successfully!";

}
</script>

</body>
</html>
