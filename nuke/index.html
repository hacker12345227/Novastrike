<!DOCTYPE html>
<html>
<head>
    <title>Bot Control</title>
</head>
<body>

<h2>Run Action</h2>

<input type="text" id="serverId" placeholder="Enter Server ID">
<button onclick="run()">Run</button>

<script>
async function run() {
    const serverId = document.getElementById("serverId").value;

    await fetch("/run", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            guild_id: serverId
        })
    });
}
</script>

</body>
</html>
